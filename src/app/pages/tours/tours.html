<!-- ─── Page hero ───────────────────────────────────────── -->
<section class="page-hero">
  <div class="hero-bg">
    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1800&q=80" alt="">
    <div class="hero-overlay"></div>
  </div>

  <div class="container hero-content">
    <p class="section-label">{{ translations[language].label }}</p>
    <h1 class="hero-title">{{ translations[language].title }}</h1>
    <p class="hero-sub">
      <span class="count">{{ tours.length }}</span>
      {{ translations[language].sub }}
    </p>
  </div>

  <div class="hero-fade"></div>
</section>

<!-- ─── Tours grid ──────────────────────────────────────── -->
<section class="tours-section">
  <div class="container">
    <div class="tours-grid">
      <app-tour-card *ngFor="let tour of tours" [tour]="tour"></app-tour-card>
    </div>
  </div>
</section>

<!-- ─── CTA strip ───────────────────────────────────────── -->
<section class="cta-strip">
  <div class="container">
    <div class="cta-card">
      <div>
        <p class="section-label">Bespoke</p>
        <h2 class="section-title">{{ translations[language].ctaTitle }}</h2>
        <div class="divider"></div>
        <p>{{ translations[language].ctaText }}</p>
      </div>

      <a routerLink="/" fragment="contact" class="btn-primary">
        {{ translations[language].ctaBtn }}
      </a>
    </div>
  </div>
</section>
